<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Z-SOLDIER: Pixel Carnage</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <h1 class="game-title">Z-SOLDIER</h1>
      <div class="game-container" id="game-container">
        <!-- Phaser will inject the canvas here -->
      </div>
      <div class="instructions">
        <div class="instructions-title">HOW TO PLAY</div>
        <p>Use <span>WASD</span> to Move & Jump. Aim with your <span>Mouse</span> and click <span>Left Click</span> to Shoot.</p>
        <p>Switch weapons with <span>1</span> (Pistol - Infinite), <span>2</span> (Shotgun), or <span>3</span> (Machine Gun).</p>
        <p>Survive 5 waves, defeat the <span>Mid-Boss</span> at Wave 2 and the <span>Final Boss</span> at Wave 5!</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
